description:
  it:
    features:
      - archiviazione documentale
    longDescription: |
      Componente software per la ricerca e l'identificazione dei tipi di dato a cui l'utente invocante è abilitato. Il servizio espone due API REST che restituiscono una lista in formato JSON standard contenente i tipi dato delle strutture SACER (registri, tipi ud, tipi doc, tipi fascicolo e sottostrutture) o dei versatori PING (tipi object), filtrabili specificando come parametri di ricerca (query-params) la struttura o il versatore.
    shortDescription: |-
      API REST per la ricerca dei tipi dato abilitati di una struttura SACER o di un versatore PING
